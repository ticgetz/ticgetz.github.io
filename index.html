  <!-- QR Camera Scanner for Mobile Check-in -->
  <script>
    (function() {
      var _qrStream = null;
      var _qrVideo = null;
      var _qrCanvas = null;
      var _qrCtx = null;
      var _qrScanning = false;
      var _qrCallback = null;
      var _qrAnimFrame = null;

      window.startQrScanner = function(videoElementId, callback) {
        _qrCallback = callback;
        _qrVideo = document.getElementById(videoElementId);
        if (!_qrVideo) { console.error('QR: video element not found'); return; }

        _qrCanvas = document.createElement('canvas');
        _qrCtx = _qrCanvas.getContext('2d', { willReadFrequently: true });

        var constraints = {
          video: { facingMode: 'environment', width: { ideal: 720 }, height: { ideal: 720 } },
          audio: false
        };

        navigator.mediaDevices.getUserMedia(constraints).then(function(stream) {
          _qrStream = stream;
          _qrVideo.srcObject = stream;
          _qrVideo.setAttribute('playsinline', 'true');
          _qrVideo.play();
          _qrScanning = true;
          _qrVideo.addEventListener('loadedmetadata', function() {
            _qrCanvas.width = _qrVideo.videoWidth;
            _qrCanvas.height = _qrVideo.videoHeight;
            _scanFrame();
          });
        }).catch(function(err) {
          console.error('QR Camera error:', err);
          if (_qrCallback) _qrCallback('__ERROR__:' + err.message);
        });
      };

      function _scanFrame() {
        if (!_qrScanning) return;
        _qrAnimFrame = requestAnimationFrame(_scanFrame);

        if (_qrVideo.readyState !== _qrVideo.HAVE_ENOUGH_DATA) return;

        _qrCtx.drawImage(_qrVideo, 0, 0, _qrCanvas.width, _qrCanvas.height);
        var imageData = _qrCtx.getImageData(0, 0, _qrCanvas.width, _qrCanvas.height);

        // Try BarcodeDetector API first (Chrome/Edge)
        if (window.BarcodeDetector) {
          var detector = new BarcodeDetector({ formats: ['qr_code'] });
          detector.detect(_qrVideo).then(function(barcodes) {
            if (barcodes.length > 0 && _qrCallback && _qrScanning) {
              _qrScanning = false;
              _qrCallback(barcodes[0].rawValue);
            }
          }).catch(function() {
            // fallback to jsQR
            _tryJsQR(imageData);
          });
        } else {
          // Use jsQR fallback
          _tryJsQR(imageData);
        }
      }

      function _tryJsQR(imageData) {
        if (typeof jsQR !== 'function') return;
        var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
        if (code && code.data && _qrCallback && _qrScanning) {
          _qrScanning = false;
          _qrCallback(code.data);
        }
      }

      window.stopQrScanner = function() {
        _qrScanning = false;
        if (_qrAnimFrame) { cancelAnimationFrame(_qrAnimFrame); _qrAnimFrame = null; }
        if (_qrStream) {
          _qrStream.getTracks().forEach(function(t) { t.stop(); });
          _qrStream = null;
        }
        if (_qrVideo) { _qrVideo.srcObject = null; }
        _qrCallback = null;
      };

      window.resumeQrScanner = function() {
        if (_qrVideo && _qrStream && !_qrScanning) {
          _qrScanning = true;
          _scanFrame();
        }
      };

      window.isQrScannerActive = function() {
        return _qrScanning;
      };
    })();
  </script>

  <!-- Version Management & Auto-Refresh -->
  <script>
    (function() {
      // Disable version-based reloading on localhost to prevent infinite refresh loop
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        console.log('🛠️ Dev mode: version auto-reload disabled');
        return;
      }

      var CURRENT_VERSION = document.querySelector('meta[name="app-version"]').getAttribute('content');
      var VERSION_KEY = 'ticgetz_app_version';
      var LAST_VERSION = localStorage.getItem(VERSION_KEY);
      
      console.log('📱 App Version: ' + CURRENT_VERSION + ', Last Version: ' + LAST_VERSION);

      function clearCachesAndReload() {
        // Clear service worker caches
        if ('serviceWorker' in navigator) {
          caches.keys().then(function(cacheNames) {
            return Promise.all(
              cacheNames.map(function(cacheName) {
                console.log('🗑️ Clearing cache: ' + cacheName);
                return caches.delete(cacheName);
              })
            );
          }).then(function() {
            // Unregister all service workers
            return navigator.serviceWorker.getRegistrations();
          }).then(function(registrations) {
            return Promise.all(
              registrations.map(function(reg) {
                console.log('🗑️ Unregistering service worker');
                return reg.unregister();
              })
            );
          }).then(function() {
            window.location.reload(true);
          }).catch(function() {
            window.location.reload(true);
          });
        } else {
          window.location.reload(true);
        }
      }
      
      // On-load version check (existing behavior)
      if (LAST_VERSION && LAST_VERSION !== CURRENT_VERSION) {
        console.log('🔄 App updated from ' + LAST_VERSION + ' to ' + CURRENT_VERSION + '. Reloading...');
        localStorage.setItem(VERSION_KEY, CURRENT_VERSION);
        clearCachesAndReload();
      } else {
        localStorage.setItem(VERSION_KEY, CURRENT_VERSION);
      }

      // Background polling: check version.json every 60s
      var POLL_INTERVAL = 60 * 1000; // 60 seconds
      var isReloading = false;

      function checkForUpdate() {
        if (isReloading) return;
        var url = '/version.json?_t=' + Date.now();
        fetch(url, { cache: 'no-store' })
          .then(function(resp) { return resp.json(); })
          .then(function(data) {
            if (data && data.version && data.version !== CURRENT_VERSION) {
              console.log('🆕 New version detected: ' + data.version + ' (current: ' + CURRENT_VERSION + ')');
              isReloading = true;
              localStorage.setItem(VERSION_KEY, data.version);
              clearCachesAndReload();
            }
          })
          .catch(function() { /* silently ignore fetch errors */ });
      }

      // Start polling after app has loaded
      setTimeout(function() {
        checkForUpdate(); // first check 10s after load
        setInterval(checkForUpdate, POLL_INTERVAL);
      }, 10000);

      // Also check when tab becomes visible again
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
          checkForUpdate();
        }
      });
    })();
  </script>

  <script>
    window.initiateCashfreePayment = function (sessionId) {
      const cashfree = Cashfree({ mode: "production" });
      cashfree.checkout({
        paymentSessionId: sessionId,
        redirectTarget: "_self",
      });
    }

    window.openRazorpayCheckout = function (options) {
      var rzp = new Razorpay(options);
      rzp.on('payment.failed', function (response) {
        console.error('Razorpay payment failed:', response.error);
        if (options.modal && options.modal.ondismiss) {
          options.modal.ondismiss();
        }
      });
      rzp.open();
    }
  </script>
